version: "3.9"

services:
  backend:
    build: ./backend
    container_name: stt-backend
    ports:
      - "8010:8010"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./app
    container_name: stt-frontend
    ports:
      - "3010:3010"
    volumes:
      - ./app:/app
    stdin_open: true
    tty: true
